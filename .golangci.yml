version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - exhaustive
  exclusions:
    rules:
      - linters: [revive]
        text: "package-comments"
      - linters: [revive]
        text: "exported"

linters-settings:
  revive: {}

formatters:
  enable:
    - goimports

formatters-settings:
  goimports:
    local-prefixes:
      - github.com/mhihasan/contract-review-ai-agent

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
